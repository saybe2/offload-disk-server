services:
  prometheus:
    image: prom/prometheus:latest
    container_name: offload-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=14d"
      - "--web.enable-lifecycle"
    volumes:
      - ./deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - offload_net

  loki:
    image: grafana/loki:2.9.8
    container_name: offload-loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/local-config.yml"]
    volumes:
      - ./deploy/monitoring/loki-config.yml:/etc/loki/local-config.yml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - offload_net

  promtail:
    image: grafana/promtail:2.9.8
    container_name: offload-promtail
    restart: unless-stopped
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ./deploy/monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - offload_net

  grafana:
    image: grafana/grafana:11.1.4
    container_name: offload-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - loki
    networks:
      - offload_net

volumes:
  prometheus_data:
  loki_data:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=5g,uid=10001,gid=10001
  grafana_data:

networks:
  offload_net:
    external: true
    name: offload_net
